name: Daily İhale Tarama

on:
  schedule:
    # Her gün Türkiye saatiyle 08:00'de çalışır (UTC 05:00)
    - cron: '0 5 * * *'
  
  # Manuel tetikleme için (test amaçlı)
  workflow_dispatch:

jobs:
  run-ihale-checker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Kodu çek
      uses: actions/checkout@v3
    
    - name: Python kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Bağımlılıkları yükle
      run: |
        pip install supabase groq python-dotenv requests beautifulsoup4 lxml
    
    - name: Ana scripti çalıştır
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: python main.py